backend:
  name: git-gateway
  branch: main

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Cím", name: "title", widget: "string" }
      - { label: "Dátum", name: "date", widget: "datetime" }
      - { label: "Kép", name: "image", widget: "image", required: false }
      - { label: "Bevezető", name: "excerpt", widget: "text" }
      - { label: "Tartalom", name: "body", widget: "markdown" }
