<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main',
        },
        media_folder: 'public/media',
        public_folder: '/media',
        collections: [
          {
            name: 'blog',
            label: 'Blog',
            folder: 'src/content/blog',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Cím', name: 'title', widget: 'string' },
              { label: 'Dátum', name: 'date', widget: 'datetime' },
              { label: 'Kép', name: 'image', widget: 'image', required: false },
              { label: 'Bevezető', name: 'excerpt', widget: 'text' },
              { label: 'Tartalom', name: 'body', widget: 'markdown' },
            ],
          },
        ],
      },
    })
  </script>
</body>
</html>
